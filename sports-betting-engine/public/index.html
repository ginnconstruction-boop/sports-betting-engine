<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBE // Elite v2.2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#090c10;--bg2:#0d1117;--bg3:#161b22;--border:#21262d;
  --green:#39d353;--green-dim:#1a6b2a;--yellow:#f0c040;--red:#f85149;
  --blue:#58a6ff;--text:#e6edf3;--muted:#7d8590;
  --font-mono:'Share Tech Mono',monospace;--font-ui:'Barlow Condensed',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:radial-gradient(ellipse at 50% 0%,#0d2a1a 0%,var(--bg) 70%)}
.login-logo{font-family:var(--font-ui);font-weight:900;font-size:clamp(2.5rem,8vw,4.5rem);color:var(--green);text-shadow:0 0 40px rgba(57,211,83,.4);margin-bottom:.2rem}
.login-sub{font-size:.75rem;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:3rem}
.login-box{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:2rem;width:100%;max-width:360px}
.login-box input{width:100%;background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font-mono);font-size:.9rem;padding:.75rem 1rem;border-radius:6px;margin-bottom:.75rem;outline:none;transition:border-color .15s}
.login-box input:focus{border-color:var(--green)}
.login-btn{width:100%;background:var(--green);color:#000;border:none;font-family:var(--font-ui);font-weight:700;font-size:1rem;letter-spacing:.1em;padding:.85rem;border-radius:6px;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-error{color:var(--red);font-size:.8rem;margin-top:.75rem;text-align:center;min-height:1.2rem}

/* DASHBOARD */
#dashboard{display:none;min-height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-family:var(--font-ui);font-weight:900;font-size:1.4rem;color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.topbar-status{font-size:.7rem;color:var(--muted);letter-spacing:.1em}
.logout-btn,.icon-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--font-mono);font-size:.75rem;padding:.4rem .8rem;border-radius:4px;cursor:pointer;transition:all .15s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.icon-btn:hover{border-color:var(--blue);color:var(--blue)}
.icon-btn.active{border-color:var(--yellow);color:var(--yellow)}

.main{max-width:960px;margin:0 auto;padding:1.5rem}
.section-label{font-family:var(--font-ui);font-weight:600;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:1.5rem 0 .6rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.btn-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.5rem;margin-bottom:.5rem}
.scan-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-weight:600;font-size:.85rem;letter-spacing:.05em;padding:.7rem .8rem;border-radius:6px;cursor:pointer;text-align:left;transition:all .15s;display:flex;align-items:center;gap:.5rem;position:relative}
.scan-btn:hover{border-color:var(--green);color:var(--green);background:rgba(57,211,83,.05)}
.scan-btn.prime{border-color:var(--green-dim);background:rgba(57,211,83,.07)}
.scan-btn.prime:hover{border-color:var(--green);background:rgba(57,211,83,.12)}
.scan-btn.prop{border-color:#1d3040}
.scan-btn.prop:hover{border-color:var(--blue);color:var(--blue);background:rgba(88,166,255,.05)}
.scan-btn.track{border-color:#2d2000}
.scan-btn.track:hover{border-color:var(--yellow);color:var(--yellow);background:rgba(240,192,64,.05)}
.scan-btn.running{border-color:var(--green);color:var(--green);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.scan-btn .num{font-family:var(--font-mono);font-size:.65rem;color:var(--muted);min-width:1.4rem}

/* STATS BAR */
.stats-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.5rem;margin-bottom:1rem}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:.75rem}
.stat-label{font-size:.65rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:.25rem}
.stat-value{font-family:var(--font-ui);font-weight:700;font-size:1.4rem;color:var(--text)}
.stat-value.green{color:var(--green)}.stat-value.red{color:var(--red)}.stat-value.yellow{color:var(--yellow)}

/* OUTPUT PANEL */
#output-panel{display:none;margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.output-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.output-title{font-family:var(--font-ui);font-weight:700;font-size:.85rem;letter-spacing:.1em}
.output-actions{display:flex;gap:.5rem}
.output-close,.output-copy{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:3px;font-family:var(--font-mono)}
.output-close:hover,.output-copy:hover{background:var(--border);color:var(--text)}
#output-content{padding:1rem;font-family:var(--font-mono);font-size:.78rem;line-height:1.6;white-space:pre-wrap;overflow-x:auto;max-height:60vh;overflow-y:auto;color:#adbac7}
.line-green{color:var(--green)}.line-yellow{color:var(--yellow)}.line-red{color:var(--red)}.line-blue{color:var(--blue)}.line-muted{color:var(--muted)}.line-header{color:var(--text)}
.streaming-indicator{display:inline-block;width:8px;height:8px;background:var(--green);border-radius:50%;margin-left:8px;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* HISTORY PANEL */
#history-panel{display:none;margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.history-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.history-title{font-family:var(--font-ui);font-weight:700;font-size:.85rem;letter-spacing:.1em}
#history-list{max-height:50vh;overflow-y:auto}
.history-item{padding:.6rem 1rem;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:.75rem;transition:background .15s}
.history-item:hover{background:var(--bg3)}
.history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.history-dot.ok{background:var(--green)}.history-dot.err{background:var(--red)}
.history-label{font-family:var(--font-ui);font-weight:600;font-size:.85rem;flex:1}
.history-time{font-size:.7rem;color:var(--muted)}
.history-empty{padding:1.5rem;text-align:center;color:var(--muted);font-size:.8rem}

/* PICKS TABLE */
#picks-panel{display:none;margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.picks-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between}
.picks-title{font-family:var(--font-ui);font-weight:700;font-size:.85rem;letter-spacing:.1em}
.picks-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:.2rem .4rem;border-radius:3px}
.picks-close:hover{background:var(--border);color:var(--text)}
#picks-table-wrap{overflow-x:auto;max-height:60vh;overflow-y:auto}
table.picks-tbl{width:100%;border-collapse:collapse;font-size:.75rem}
table.picks-tbl th{background:#0d2a1a;color:var(--green);font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px;text-align:left;position:sticky;top:0}
table.picks-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
table.picks-tbl tr:nth-child(even) td{background:rgba(255,255,255,.02)}
.result-badge{display:inline-block;padding:2px 7px;border-radius:3px;font-weight:700;font-size:.65rem}
.result-badge.WIN{background:rgba(57,211,83,.2);color:var(--green)}
.result-badge.LOSS{background:rgba(248,81,73,.2);color:var(--red)}
.result-badge.PUSH{background:rgba(240,192,64,.2);color:var(--yellow)}
.result-badge.PENDING{background:rgba(125,133,144,.15);color:var(--muted)}
.result-btn{padding:3px 8px;border-radius:3px;border:1px solid;font-size:.65rem;cursor:pointer;font-family:var(--font-mono);background:transparent;margin:0 2px;transition:all .15s}
.result-btn.w{border-color:var(--green);color:var(--green)}.result-btn.w:hover{background:var(--green);color:#000}
.result-btn.l{border-color:var(--red);color:var(--red)}.result-btn.l:hover{background:var(--red);color:#000}
.result-btn.p{border-color:var(--yellow);color:var(--yellow)}.result-btn.p:hover{background:var(--yellow);color:#000}

/* SPINNER */
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:600px){.main{padding:1rem}.btn-grid{grid-template-columns:repeat(2,1fr)}.topbar{padding:.6rem 1rem}.topbar-logo{font-size:1.1rem}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">SBE</div>
  <div class="login-sub">Sports Betting Engine // Elite Model v2.2</div>
  <div class="login-box">
    <input type="text" id="username" placeholder="Username" autocomplete="username"/>
    <input type="password" id="password" placeholder="Password" autocomplete="current-password"/>
    <button class="login-btn" onclick="doLogin()">ACCESS SYSTEM</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">SBE // ELITE v2.2</div>
    <div class="topbar-right">
      <span class="topbar-status" id="topbar-date"></span>
      <button class="icon-btn" id="history-toggle-btn" onclick="toggleHistory()" title="Scan History">HISTORY</button>
      <button class="icon-btn" onclick="openReports()" title="Saved Reports">REPORTS</button>
      <button class="icon-btn" id="picks-toggle-btn" onclick="togglePicks()" title="All Picks">PICKS</button>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <div class="main">
    <!-- STATS -->
    <div class="stats-bar">
      <div class="stat-card" onclick="togglePicks()" style="cursor:pointer" title="Click to view all picks"><div class="stat-label">Total Picks &#x2197;</div><div class="stat-value" id="stat-total">--</div></div>
      <div class="stat-card"><div class="stat-label">Record</div><div class="stat-value" id="stat-record">--</div></div>
      <div class="stat-card"><div class="stat-label">Win Rate</div><div class="stat-value" id="stat-winpct">--</div></div>
      <div class="stat-card"><div class="stat-label">Profit</div><div class="stat-value" id="stat-profit">--</div></div>
    </div>

    <!-- FULL SCANS -->
    <div class="section-label">Full Scans — All Sports</div>
    <div class="btn-grid">
      <button class="scan-btn prime" onclick="runCmd('morning','Morning Scan')"><span class="num">01</span>Morning Scan</button>
      <button class="scan-btn prime" onclick="runCmd('midday','Midday Card')"><span class="num">02</span>Midday Card</button>
      <button class="scan-btn" onclick="runCmd('full','Full Scan')"><span class="num">03</span>Full Scan</button>
    </div>

    <!-- SINGLE SPORT -->
    <div class="section-label">Single Sport Scans</div>
    <div class="btn-grid">
      <button class="scan-btn" onclick="runCmd('nba','NBA')"><span class="num">04</span>NBA</button>
      <button class="scan-btn" onclick="runCmd('mlb','MLB')"><span class="num">05</span>MLB</button>
      <button class="scan-btn" onclick="runCmd('nhl','NHL')"><span class="num">06</span>NHL</button>
      <button class="scan-btn" onclick="runCmd('ncaab','NCAAB')"><span class="num">07</span>NCAAB</button>
      <button class="scan-btn" onclick="runCmd('nfl','NFL')"><span class="num">08</span>NFL</button>
      <button class="scan-btn" onclick="runCmd('ncaaf','NCAAF')"><span class="num">09</span>NCAAF</button>
      <button class="scan-btn" onclick="runCmd('ncaa-baseball','NCAA Baseball')"><span class="num">10</span>NCAA Baseball</button>
    </div>

    <!-- PROPS -->
    <div class="section-label">Player Props & Parlays</div>
    <div class="btn-grid">
      <button class="scan-btn prop" onclick="runCmd('props','NBA Props')"><span class="num">11</span>NBA Props</button>
      <button class="scan-btn prop" onclick="runCmd('mlbprops','MLB Props')"><span class="num">11b</span>MLB Props</button>
      <button class="scan-btn prop" onclick="runCmd('nhlprops','NHL Props')"><span class="num">11c</span>NHL Props</button>
      <button class="scan-btn prop" onclick="runCmd('nflprops','NFL Props')"><span class="num">11d</span>NFL Props</button>
      <button class="scan-btn prop" onclick="runCmd('altparlays','NBA Alt Parlays')"><span class="num">12</span>NBA Alt Parlays</button>
      <button class="scan-btn prop" onclick="runCmd('altparlays-nfl','NFL Alt Parlays')"><span class="num">13</span>NFL Alt Parlays</button>
      <button class="scan-btn prop" onclick="runCmd('sgp','NBA SGP')"><span class="num">14</span>NBA SGP</button>
      <button class="scan-btn prop" onclick="runCmd('sgp-nfl','NFL SGP')"><span class="num">15</span>NFL SGP</button>
      <button class="scan-btn prop" onclick="runCmd('firstbasket','First Basket')"><span class="num">28</span>First Basket</button>
      <button class="scan-btn prop" onclick="runCmd('firsttd','First TD')"><span class="num">29</span>First TD</button>
    </div>

    <!-- TRACKING -->
    <div class="section-label">Tracking & Reports</div>
    <div class="btn-grid">
      <button class="scan-btn track" onclick="togglePicks()"><span class="num">16</span>Enter Results</button>
      <button class="scan-btn track" onclick="runCmd('record','W/L Report')"><span class="num">17</span>W/L Report</button>
      <button class="scan-btn track" onclick="runCmd('retro','Retro Analysis')"><span class="num">18</span>Retro Analysis</button>
      <button class="scan-btn track" onclick="runCmd('week','Weekly Summary')"><span class="num">19</span>Weekly Summary</button>
      <button class="scan-btn track" onclick="runCmd('clv','CLV Report')"><span class="num">20</span>CLV Report</button>
      <button class="scan-btn track" onclick="runCmd('calibrate','Calibration')"><span class="num">21</span>Calibration</button>
      <button class="scan-btn track" onclick="runCmd('historical','Historical Odds')"><span class="num">22</span>Historical Odds</button>
      <button class="scan-btn track" onclick="runCmd('clv-picks','All Picks')"><span class="num">23</span>All Picks</button>
      <button class="scan-btn track" onclick="runCmd('fixresults','Fix Results')"><span class="num">24</span>Fix Results</button>
    </div>

    <!-- OTHER -->
    <div class="section-label">Other</div>
    <div class="btn-grid">
      <button class="scan-btn" onclick="runCmd('mock','Preview')"><span class="num">25</span>Preview</button>
      <button class="scan-btn prime" onclick="runCmd('lategames','Late Games (90min)')"><span class="num">LG</span>Late Games 90min</button>
    </div>

    <!-- OUTPUT PANEL -->
    <div id="output-panel">
      <div class="output-header">
        <span class="output-title" id="output-title">OUTPUT<span id="streaming-dot" class="streaming-indicator" style="display:none"></span></span>
        <div class="output-actions">
          <button class="output-copy" onclick="copyOutput()" title="Copy output">COPY</button>
          <button class="output-pdf" id="pdf-btn" onclick="savePDF()" title="Open as PDF" style="display:none;background:none;border:1px solid var(--green);color:var(--green);font-family:var(--font-mono);font-size:.75rem;padding:.2rem .6rem;border-radius:3px;cursor:pointer">SAVE PDF</button>
          <button class="output-close" onclick="closeOutput()">&#x2715;</button>
        </div>
      </div>
      <div id="output-content"></div>
    </div>

    <!-- HISTORY PANEL -->
    <div id="history-panel">
      <div class="history-header">
        <span class="history-title">SCAN HISTORY</span>
        <button class="output-close" onclick="toggleHistory()">&#x2715;</button>
      </div>
      <div id="history-list"></div>
    </div>

    <!-- PICKS PANEL -->
    <div id="picks-panel">
      <div class="picks-header">
        <span class="picks-title">PICKS LOG &amp; RESULTS ENTRY</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          <button class="result-btn w" style="font-size:.7rem;padding:3px 10px" onclick="filterPicks('today')">TODAY</button>
          <button class="result-btn p" style="font-size:.7rem;padding:3px 10px" onclick="filterPicks('yesterday')">YESTERDAY</button>
          <button class="result-btn l" style="font-size:.7rem;padding:3px 10px;border-color:var(--muted);color:var(--muted)" onclick="filterPicks('pending')">PENDING</button>
          <button class="result-btn p" style="font-size:.7rem;padding:3px 10px;border-color:var(--muted);color:var(--muted)" onclick="filterPicks('all')">ALL</button>
        </div>
        <button class="picks-close" onclick="togglePicks()">&#x2715;</button>
      </div>
      <div id="picks-table-wrap">
        <div id="picks-loading" style="padding:1.5rem;text-align:center;color:var(--muted)">Loading picks...</div>
      </div>
    </div>
  </div>
</div>

<script>
let authToken = localStorage.getItem('sbe_token') || '';
let currentBtn = null;
let currentES = null;
let fullOutputText = '';

// ── Init ──
window.onload = function() {
  updateClock();
  setInterval(updateClock, 60000);
  if (authToken) { showDashboard(); loadStats(); }
  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('username').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('password').focus(); });
};
function updateClock() {
  document.getElementById('topbar-date').textContent =
    new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}) + ' ' +
    new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}

// ── Auth ──
async function doLogin() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;
  document.getElementById('login-error').textContent = '';
  try {
    const r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d = await r.json();
    if (r.ok) {
      authToken = d.token;
      localStorage.setItem('sbe_token', authToken);
      showDashboard();
      loadStats();
    } else {
      document.getElementById('login-error').textContent = d.error || 'Login failed';
    }
  } catch { document.getElementById('login-error').textContent = 'Connection error'; }
}
async function doLogout() {
  try { await fetch('/api/logout',{method:'POST',headers:{'x-auth-token':authToken}}); } catch {}
  authToken = ''; localStorage.removeItem('sbe_token');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
}

// ── Run command with SSE streaming ──
function runCmd(cmd, label) {
  // Cancel any running stream
  if (currentES) { currentES.close(); currentES = null; }
  if (currentBtn) { currentBtn.classList.remove('running'); currentBtn = null; }

  const panel = document.getElementById('output-panel');
  const content = document.getElementById('output-content');
  const title = document.getElementById('output-title');
  const dot = document.getElementById('streaming-dot');

  panel.style.display = 'block';
  title.childNodes[0].textContent = label.toUpperCase();
  dot.style.display = 'inline-block';
  content.innerHTML = `<div style="padding:2rem;text-align:center">
    <div class="spinner" style="margin:0 auto 1rem"></div>
    <div style="color:var(--muted);font-size:.8rem;letter-spacing:.1em">RUNNING ${label.toUpperCase()}...</div>
    <div style="color:var(--muted);font-size:.7rem;margin-top:.5rem">Output will stream here as it runs</div>
  </div>`;
  fullOutputText = '';
  const pdfBtn2 = document.getElementById('pdf-btn');
  if (pdfBtn2) pdfBtn2.style.display = 'none';

  // Mark button as running
  const btn = event?.currentTarget;
  if (btn) { btn.classList.add('running'); currentBtn = btn; }

  setTimeout(() => panel.scrollIntoView({behavior:'smooth',block:'start'}), 100);

  // Start streaming directly
  streamSSE(cmd, label, content, dot, btn);
}

async function streamSSE(cmd, label, content, dot, btn) {
  return new Promise(async (resolve) => {
    const resp = await fetch(`/api/stream/${cmd}?label=${encodeURIComponent(label)}`, {
      headers: { 'x-auth-token': authToken }
    });

    if (resp.status === 401) { doLogout(); resolve(); return; }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    const flush = () => {
      content.innerHTML = colorize(fullOutputText);
      content.scrollTop = content.scrollHeight;
    };

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });

      let idx;
      while ((idx = buf.indexOf('\n\n')) !== -1) {
        const block = buf.slice(0, idx);
        buf = buf.slice(idx + 2);

        const evMatch = block.match(/^event: (.+)/m);
        const dataMatch = block.match(/^data: (.+)/m);
        if (!dataMatch) continue;

        let parsed;
        try { parsed = JSON.parse(dataMatch[1]); } catch { continue; }

        const evType = evMatch ? evMatch[1] : 'line';
        if (evType === 'line') {
          fullOutputText += parsed;
          flush();
        } else if (evType === 'done') {
          dot.style.display = 'none';
          if (btn) btn.classList.remove('running');
          // Show Save PDF button now that scan is complete
          const pdfBtn = document.getElementById('pdf-btn');
          if (pdfBtn) pdfBtn.style.display = 'inline-block';
          // Refresh stats after tracking commands
          loadStats();
          resolve();
        }
      }
    }

    dot.style.display = 'none';
    if (btn) btn.classList.remove('running');
    resolve();
  });
}

function closeOutput() {
  document.getElementById('output-panel').style.display = 'none';
  if (currentES) { currentES.close(); currentES = null; }
  const pdfBtn = document.getElementById('pdf-btn');
  if (pdfBtn) pdfBtn.style.display = 'none';
}
function copyOutput() {
  navigator.clipboard.writeText(fullOutputText).then(() => {
    const btn = document.querySelector('.output-copy');
    btn.textContent = 'COPIED';
    setTimeout(() => btn.textContent = 'COPY', 1500);
  });
}

// ── Colorize terminal output ──
function colorize(text) {
  return text.split('\n').map(line => {
    const e = line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (/\[HOT\]|Grade: A\+|##########|\[OK\] Saved/.test(e)) return `<span class="line-green">${e}</span>`;
    if (/LEAN|Grade: [AB]|SOLID|#######/.test(e)) return `<span class="line-yellow">${e}</span>`;
    if (/LOSS|error|failed|Error/.test(e)) return `<span class="line-red">${e}</span>`;
    if (/FanDuel|BetMGM|Credits|API|CLK/.test(e)) return `<span class="line-blue">${e}</span>`;
    if (/^[\s]*[-=+|]/.test(e)) return `<span class="line-header">${e}</span>`;
    if (/^[\s]*$/.test(e)) return `<span class="line-muted">${e}</span>`;
    return e;
  }).join('\n');
}

// ── Stats ──
async function loadStats() {
  try {
    const r = await fetch('/api/picks',{headers:{'x-auth-token':authToken}});
    if (!r.ok) return;
    const picks = await r.json();
    if (!picks.length) return;
    const graded = picks.filter(p => p.gameResult !== 'PENDING');
    const wins   = graded.filter(p => p.gameResult === 'WIN').length;
    const losses = graded.filter(p => p.gameResult === 'LOSS').length;
    const winPct = (wins + losses) > 0 ? Math.round(wins/(wins+losses)*100) : 0;
    let profit = 0;
    graded.forEach(p => {
      const price = (typeof p.pickedPrice==='number'&&isFinite(p.pickedPrice)) ? p.pickedPrice : -110;
      if (p.gameResult==='WIN') profit += price>0 ? price : (100/Math.abs(price))*100;
      else if (p.gameResult==='LOSS') profit -= 100;
    });
    document.getElementById('stat-total').textContent = picks.length;
    document.getElementById('stat-record').textContent = `${wins}-${losses}`;
    const wp = document.getElementById('stat-winpct');
    wp.textContent = graded.length ? winPct+'%' : '--';
    wp.className = 'stat-value ' + (winPct>=55?'green':winPct>=45?'yellow':'red');
    const pr = document.getElementById('stat-profit');
    pr.textContent = graded.length ? `${profit>=0?'+':''}$${Math.round(profit)}` : '--';
    pr.className = 'stat-value ' + (profit>=0?'green':'red');
  } catch {}
}

// ── History ──
async function toggleHistory() {
  const panel = document.getElementById('history-panel');
  const picksPanel = document.getElementById('picks-panel');
  picksPanel.style.display = 'none';
  const btn = document.getElementById('history-toggle-btn');
  if (panel.style.display !== 'none') {
    panel.style.display = 'none'; btn.classList.remove('active'); return;
  }
  btn.classList.add('active');
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  await loadHistory();
}
async function loadHistory() {
  const list = document.getElementById('history-list');
  try {
    const r = await fetch('/api/history',{headers:{'x-auth-token':authToken}});
    const history = await r.json();
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">No scan history yet. Run a scan to start tracking.</div>';
      return;
    }
    list.innerHTML = history.map((h,i) => {
      const ts = new Date(h.timestamp).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return `<div class="history-item" onclick="showHistoryItem(${i})">
        <div class="history-dot ${h.ok?'ok':'err'}"></div>
        <div class="history-label">${h.label || h.command}</div>
        <div class="history-time">${ts}</div>
      </div>`;
    }).join('');
    list._data = history;
  } catch {
    list.innerHTML = '<div class="history-empty">Could not load history.</div>';
  }
}
function showHistoryItem(idx) {
  const list = document.getElementById('history-list');
  const h = list._data?.[idx];
  if (!h) return;
  const panel = document.getElementById('output-panel');
  const content = document.getElementById('output-content');
  const title = document.getElementById('output-title');
  fullOutputText = h.output || '';
  title.childNodes[0].textContent = (h.label || h.command).toUpperCase() + ' (history)';
  document.getElementById('streaming-dot').style.display = 'none';
  content.innerHTML = colorize(fullOutputText);
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Picks table with inline results entry ──
async function togglePicks() {
  const panel = document.getElementById('picks-panel');
  const histPanel = document.getElementById('history-panel');
  histPanel.style.display = 'none';
  document.getElementById('history-toggle-btn').classList.remove('active');
  const btn = document.getElementById('picks-toggle-btn');
  if (panel.style.display !== 'none') {
    panel.style.display = 'none'; btn.classList.remove('active'); return;
  }
  btn.classList.add('active');
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth',block:'start'});
  await loadPicksTable();
}

async function loadPicksTable() {
  const wrap = document.getElementById('picks-table-wrap');
  wrap.innerHTML = '<div id="picks-loading" style="padding:1.5rem;text-align:center;color:var(--muted)">Loading...</div>';
  try {
    const r = await fetch('/api/picks',{headers:{'x-auth-token':authToken}});
    const picks = await r.json();
    if (!picks.length) {
      wrap.innerHTML = '<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:.85rem">No picks logged yet. Run a scan to start tracking.</div>';
      return;
    }
    // Apply filter
    const todayStr = new Date().toISOString().slice(0,10);
    const yesterdayStr = new Date(Date.now()-86400000).toISOString().slice(0,10);
    let filtered = picks;
    if (currentFilter === 'today') {
      filtered = picks.filter(p => (p.date||p.gameTime||'').slice(0,10) === todayStr);
    } else if (currentFilter === 'yesterday') {
      filtered = picks.filter(p => (p.date||p.gameTime||'').slice(0,10) === yesterdayStr);
    } else if (currentFilter === 'pending') {
      filtered = picks.filter(p => !p.gameResult || p.gameResult === 'PENDING');
    }
    if (filtered.length === 0) {
      wrap.innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--muted);font-size:.85rem">No picks found for filter: ${currentFilter.toUpperCase()}</div>`;
      return;
    }
    const sorted = [...filtered].sort((a,b) => new Date(b.date||b.gameTime||0)-new Date(a.date||a.gameTime||0));
    const rows = sorted.map(p => {
      const date = (p.date||p.gameTime||'').slice(0,10);
      const price = typeof p.pickedPrice==='number'&&isFinite(p.pickedPrice) ? `${p.pickedPrice>0?'+':''}${p.pickedPrice}` : 'n/a';
      const book  = (p.pickedBook&&p.pickedBook!=='undefined') ? p.pickedBook : 'Unknown';
      const result = p.gameResult || 'PENDING';
      const isPending = result === 'PENDING';
      const resultCell = isPending
        ? `<button class="result-btn w" onclick="enterResult('${p.pickId}','WIN')">W</button><button class="result-btn l" onclick="enterResult('${p.pickId}','LOSS')">L</button><button class="result-btn p" onclick="enterResult('${p.pickId}','PUSH')">P</button>`
        : `<span class="result-badge ${result}">${result}</span>`;
      const profit = p.profit != null ? `${p.profit>=0?'+':''}$${p.profit}` : '--';
      return `<tr>
        <td style="color:var(--muted)">${date}</td>
        <td>${p.sport||''}</td>
        <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.matchup}">${p.matchup}</td>
        <td>${p.betType||''}</td>
        <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${p.side}">${p.side}</td>
        <td>${book}</td>
        <td style="color:var(--green);font-weight:bold">${price}</td>
        <td><span style="color:${p.grade?.startsWith('A')?'var(--green)':'var(--yellow)'}">${p.grade||'?'}</span></td>
        <td>${resultCell}</td>
        <td style="color:${p.profit>=0?'var(--green)':'var(--red)'}">${profit}</td>
      </tr>`;
    }).join('');
    wrap.innerHTML = `<table class="picks-tbl">
      <thead><tr><th>Date</th><th>Sport</th><th>Game</th><th>Type</th><th>Pick</th><th>Book</th><th>Price</th><th>Grade</th><th>Result</th><th>P&L</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  } catch(e) {
    wrap.innerHTML = `<div style="padding:1.5rem;text-align:center;color:var(--red)">Error loading picks: ${e.message}</div>`;
  }
}

let currentFilter = 'all';
function filterPicks(filter) {
  currentFilter = filter;
  loadPicksTable();
}

function savePDF() {
  // Opens the latest report in a new tab -- user clicks Ctrl+P -> Save as PDF
  // Token passed as query param since window.open can't send custom headers
  window.open('/api/report/latest?token=' + encodeURIComponent(authToken), '_blank');
}

async function openReports() {
  try {
    const r = await fetch('/api/reports', { headers: { 'x-auth-token': authToken } });
    const reports = await r.json();
    if (!reports.length) {
      alert('No saved reports yet. Run a scan first.');
      return;
    }
    // Build a simple modal with report list
    const existing = document.getElementById('reports-modal');
    if (existing) existing.remove();

    const modal = document.createElement('div');
    modal.id = 'reports-modal';
    modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem';
    modal.innerHTML = `
      <div style="background:var(--bg3);border:1px solid var(--border);border-radius:8px;width:100%;max-width:520px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column">
        <div style="padding:.75rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="font-family:var(--font-ui);font-weight:700;font-size:.85rem;letter-spacing:.1em">SAVED REPORTS</span>
          <button onclick="document.getElementById('reports-modal').remove()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem">&#x2715;</button>
        </div>
        <div style="overflow-y:auto">
          ${reports.map(rp => `
            <div style="padding:.6rem 1rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.8rem;color:var(--text)">${rp.name.replace('SBE_','').replace('.html','').replace(/_/g,' ')}</span>
              <button onclick="window.open('/api/report/${rp.name}?token=' + encodeURIComponent(authToken),'_blank')" style="background:none;border:1px solid var(--green);color:var(--green);font-family:var(--font-mono);font-size:.7rem;padding:.25rem .6rem;border-radius:3px;cursor:pointer">OPEN</button>
            </div>`).join('')}
        </div>
        <div style="padding:.6rem 1rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted)">
          Open any report, then Ctrl+P (or Cmd+P) and choose "Save as PDF"
        </div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
  } catch(e) {
    alert('Error loading reports: ' + e.message);
  }
}

async function enterResult(pickId, result) {
  try {
    const r = await fetch('/api/results/enter',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-auth-token':authToken},
      body:JSON.stringify({pickId,result})
    });
    const d = await r.json();
    if (d.ok) {
      await loadPicksTable();
      loadStats();
    } else {
      alert('Error: ' + (d.error || 'Failed to save result'));
    }
  } catch(e) {
    alert('Error: ' + e.message);
  }
}
</script>
